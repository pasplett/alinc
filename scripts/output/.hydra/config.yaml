dataset:
  name: pattern
  num_acq: 3
  acq_size: 5
  subset_size: 1000
  num_init: null
  node_encoder: embedding
  primary_metric: acc_macro
  is_undirected: true
  evaluator:
    name: multiclass_classification
    average: macro
  early_stopping:
    mode: max
    patience: 20
  eigen:
    max_freqs: 16
    norm_type: none
    eigvec_norm: L2
model:
  name: gat
  num_epochs: 1
  train_batch_size: 128
  predict_batch_size: 128
  n_layers: 4
  hidden_dim: 19
  n_heads: 8
  pos_enc: false
  pos_enc_dim: 16
  readout_type: mlp
  optimizer:
    name: Adam
    lr: 0.001
    weight_decay: 0.0
    clip_grad_norm: false
  early_stopping:
    mode: max
    patience: 20
  lr_scheduler:
    name: cosine
al:
  strategy: random
  aggr_type: max
  device: cpu
random_seed: 42
experiment_name: alinc-active
mlflow_dir: ./experiments/alinc/active_learning/
mlflow_db: active_learning.db
num_workers: 0
logging: true
progressbar: false
status_interval: 10
debug_mode: false
strict_det_gpu: false
early_stopping: false
output_dir: ./output/
