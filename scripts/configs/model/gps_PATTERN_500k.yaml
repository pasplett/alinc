name: gps
num_epochs: 100
train_batch_size: 32
predict_batch_size: 32
n_layers: 6
hidden_dim: 64
n_heads: 4
pos_enc: True
pos_enc_dim: 16
readout_type: mlp
dropout: 0.0
optimizer: 
  name: AdamW
  lr: 5e-4
  weight_decay: 1e-5
  clip_grad_norm: True
early_stopping:
  mode: "max"
  patience: 20
lr_scheduler:
  name: cosine_with_warmup
  warmup_steps: 5
  start_factor: 0.002