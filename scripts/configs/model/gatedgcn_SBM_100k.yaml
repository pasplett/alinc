name: gatedgcn_pyg
num_epochs: 200
train_batch_size: 128
predict_batch_size: 128
n_layers: 4
hidden_dim: 70
pos_enc: False
pos_enc_dim: 16
readout_type: mlp
optimizer: 
  name: Adam
  lr: 1e-3
  weight_decay: 0.0
  clip_grad_norm: False
early_stopping:
  mode: "max"
  patience: 20
lr_scheduler:
  name: reduce_lr_on_plateau
  reduce_factor: 0.5
  patience: 5