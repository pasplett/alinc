name: gps
num_epochs: 300
train_batch_size: 32
predict_batch_size: 32
n_layers: 4
hidden_dim: 96
n_heads: 8
pos_enc: True
pos_enc_dim: 16
readout_type: mlp
dropout: 0.0
optimizer: 
  name: AdamW
  lr: 5e-4
  weight_decay: 0.
  clip_grad_norm: True
early_stopping:
  mode: "max"
  patience: 20
lr_scheduler:
  name: cosine_with_warmup
  warmup_steps: 10
  start_factor: 0.002