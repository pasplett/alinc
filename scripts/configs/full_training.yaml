defaults:
  - dataset: pattern
  - model: gat_SBM_100k

random_seed: 42
experiment_name: alinc-full
mlflow_dir: ./experiments/full_training/
mlflow_db: full_training.db
num_workers: 0
logging: True
progressbar: False
status_interval: 1
debug_mode: False

early_stopping: False

output_dir: ./output/
hydra:
  run:
    dir: ${output_dir}
  job_logging:
    handlers:
      file:
        mode: w
