      - torch-scatter==2.1.2+pt211cu128
      - rdkit==2026.3.2
      - torchmetrics==1.9.0
      - torcheval==0.0.7
      - ogb==1.3.6
      - scikit-learn==1.8.0
      - scipy==1.17.1
